name: _build (reusable)

on:
  workflow_call:
    inputs:
      version:
        description: 'Exact version to publish (e.g. 1.0.1 or 1.0.1-beta.42)'
        required: true
        type: string
      ref:
        description: 'Git ref to checkout'
        required: true
        type: string
      tag_name:
        description: 'Tag to create on the released commit (e.g. v1.0.1)'
        required: true
        type: string
      is_prerelease:
        description: 'Mark the GitHub Release as prerelease'
        required: true
        type: boolean
      make_latest:
        description: 'Mark this Release as latest'
        required: false
        type: boolean
        default: false

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/CreatioHelper.Desktop/CreatioHelper.csproj --runtime ${{ matrix.rid }} -p:PublishReadyToRun=true

      - name: Publish
        shell: bash
        run: |
          dotnet publish src/CreatioHelper.Desktop/CreatioHelper.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            --no-restore \
            --output publish \
            -p:Version=${{ inputs.version }} \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:IncludeAllContentForSelfExtract=true \
            -p:EnableCompressionInSingleFile=true \
            -p:PublishReadyToRun=true \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -p:CopyDebugSymbolFilesFromPackages=false

      - name: Strip residual PDB files
        shell: bash
        run: find publish -name '*.pdb' -delete

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path publish/* -DestinationPath "CreatioHelper-${{ matrix.rid }}-${{ inputs.version }}.zip"

      - name: Archive (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd publish
          zip -r "../CreatioHelper-${{ matrix.rid }}-${{ inputs.version }}.zip" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CreatioHelper-${{ matrix.rid }}-${{ inputs.version }}
          path: CreatioHelper-${{ matrix.rid }}-${{ inputs.version }}.zip
          if-no-files-found: error
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: ${{ inputs.tag_name }}
          target_commitish: ${{ inputs.ref }}
          prerelease: ${{ inputs.is_prerelease }}
          make_latest: ${{ inputs.make_latest && 'true' || 'false' }}
          generate_release_notes: true
          files: dist/*.zip
          fail_on_unmatched_files: true
