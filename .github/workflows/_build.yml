name: _build (reusable)

on:
  workflow_call:
    inputs:
      component:
        description: 'Component to build and release: desktop, cli or agent'
        required: true
        type: string
      version:
        description: 'Exact version to publish (e.g. 1.0.1 or 1.0.1-beta.42)'
        required: true
        type: string
      ref:
        description: 'Git ref to checkout'
        required: true
        type: string
      tag_name:
        description: 'Tag to create on the released commit (e.g. desktop-v1.0.1)'
        required: true
        type: string
      is_prerelease:
        description: 'Mark the GitHub Release as prerelease'
        required: true
        type: boolean
      make_latest:
        description: 'Mark this Release as latest'
        required: false
        type: boolean
        default: false

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve component
        id: comp
        shell: bash
        run: |
          case '${{ inputs.component }}' in
            desktop)
              project='src/CreatioHelper.Desktop/CreatioHelper.csproj'
              archive='CreatioHelper-Desktop'
              single_file='true'
              ;;
            cli)
              project='src/CreatioHelper.Cli/CreatioHelper.Cli.csproj'
              archive='creatio-helper-cli'
              single_file='true'
              ;;
            agent)
              project='src/CreatioHelper.Agent/CreatioHelper.Agent.csproj'
              archive='CreatioHelper-Agent'
              single_file='false'
              ;;
            *)
              echo "::error::Unknown component '${{ inputs.component }}' (expected desktop, cli or agent)"
              exit 1
              ;;
          esac
          echo "project=$project" >> "$GITHUB_OUTPUT"
          echo "archive=$archive-${{ matrix.rid }}-${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          echo "single_file=$single_file" >> "$GITHUB_OUTPUT"
          echo "Building $project as $archive (single file: $single_file)"

      - name: Restore
        run: dotnet restore ${{ steps.comp.outputs.project }} --runtime ${{ matrix.rid }} -p:PublishReadyToRun=true

      - name: Publish
        shell: bash
        run: |
          full_version='${{ inputs.version }}'
          version_prefix=$(echo "$full_version" | cut -d- -f1)
          version_suffix=$(echo "$full_version" | cut -s -d- -f2-)
          dotnet publish ${{ steps.comp.outputs.project }} \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            --no-restore \
            --output publish \
            -p:Version="$full_version" \
            -p:VersionPrefix="$version_prefix" \
            -p:VersionSuffix="$version_suffix" \
            -p:InformationalVersion="$full_version" \
            -p:AssemblyVersion="$version_prefix" \
            -p:FileVersion="$version_prefix" \
            -p:IncludeSourceRevisionInInformationalVersion=false \
            -p:PublishSingleFile=${{ steps.comp.outputs.single_file }} \
            -p:IncludeNativeLibrariesForSelfExtract=${{ steps.comp.outputs.single_file }} \
            -p:IncludeAllContentForSelfExtract=${{ steps.comp.outputs.single_file }} \
            -p:EnableCompressionInSingleFile=${{ steps.comp.outputs.single_file }} \
            -p:PublishReadyToRun=true \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -p:CopyDebugSymbolFilesFromPackages=false

      - name: Strip residual PDB files
        shell: bash
        run: find publish -name '*.pdb' -delete

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath "${{ steps.comp.outputs.archive }}.zip"

      - name: Archive (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd publish
          zip -r "../${{ steps.comp.outputs.archive }}.zip" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.comp.outputs.archive }}
          path: ${{ steps.comp.outputs.archive }}.zip
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: ${{ inputs.tag_name }}
          target_commitish: ${{ inputs.ref }}
          prerelease: ${{ inputs.is_prerelease }}
          make_latest: ${{ inputs.make_latest && 'true' || 'false' }}
          generate_release_notes: true
          files: dist/*.zip
          fail_on_unmatched_files: true
