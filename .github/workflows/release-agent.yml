name: Release Agent (stable)

on:
  push:
    tags:
      - 'agent-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.24). The agent-v<version> tag must not exist yet.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      tag_name: ${{ steps.read.outputs.tag_name }}
      ref: ${{ steps.read.outputs.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version and tag
        id: read
        shell: bash
        run: |
          if [[ '${{ github.event_name }}' == 'push' ]]; then
            tag='${{ github.ref_name }}'
            ver="${tag#agent-v}"
            ref='${{ github.sha }}'
          else
            ver='${{ inputs.version }}'
            tag="agent-v$ver"
            ref='${{ github.sha }}'
            if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
              echo "::error::Tag $tag already exists on origin"
              exit 1
            fi
          fi

          if [[ ! "$ver" =~ ^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version '$ver' is not a valid SemVer"
            exit 1
          fi

          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "tag_name=$tag" >> "$GITHUB_OUTPUT"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "Releasing agent $ver as $tag"

  build:
    needs: check
    uses: ./.github/workflows/_build.yml
    with:
      component: agent
      version: ${{ needs.check.outputs.version }}
      ref: ${{ needs.check.outputs.ref }}
      tag_name: ${{ needs.check.outputs.tag_name }}
      is_prerelease: false
      make_latest: false
