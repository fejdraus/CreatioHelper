name: .NET Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v3
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Restore
        run: dotnet restore CreatioHelper.sln
      - name: Build
        run: dotnet build CreatioHelper.sln --no-restore --configuration Release
      - name: Test
        run: dotnet test CreatioHelper.sln --no-build --configuration Release --blame-hang-timeout 60s
        timeout-minutes: 10
