name: Build Release

permissions:
  contents: write
  
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
          - os: ubuntu-latest
            runtime: linux-x64
    steps:
      - uses: actions/checkout@v3
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Publish
        run: |
          dotnet restore CreatioHelper.sln
          dotnet publish CreatioHelper/CreatioHelper.csproj -c Release -r ${{ matrix.runtime }} --self-contained true -p:PublishSingleFile=true -o publish --no-restore
      - name: Archive Windows
        if: runner.os == 'Windows'
        run: Compress-Archive -Path publish/* -DestinationPath CreatioHelper-${{ matrix.runtime }}.zip
        shell: pwsh
      - name: Archive Linux
        if: runner.os != 'Windows'
        run: zip -r CreatioHelper-${{ matrix.runtime }}.zip publish
      - name: Upload ZIP to GitHub Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: CreatioHelper-${{ matrix.runtime }}.zip
          asset_name: CreatioHelper-${{ matrix.runtime }}.zip
          asset_content_type: application/zip
