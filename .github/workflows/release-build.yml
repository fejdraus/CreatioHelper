name: Build Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
          - os: ubuntu-latest
            runtime: linux-x64
    steps:
      - uses: actions/checkout@v3
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Publish
        run: dotnet publish CreatioHelper/CreatioHelper.csproj -c Release -r ${{ matrix.runtime }} --self-contained true -p:PublishSingleFile=true -o publish
      - name: Archive Windows
        if: runner.os == 'Windows'
        run: Compress-Archive -Path publish/* -DestinationPath CreatioHelper-${{ matrix.runtime }}.zip
        shell: pwsh
      - name: Archive Linux
        if: runner.os != 'Windows'
        run: zip -r CreatioHelper-${{ matrix.runtime }}.zip publish
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CreatioHelper-${{ matrix.runtime }}
          path: CreatioHelper-${{ matrix.runtime }}.zip
