name: Build Release

permissions:
  contents: write

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
          - os: ubuntu-latest
            runtime: linux-x64

    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore all projects for this RID
        run: dotnet restore CreatioHelper.sln --runtime ${{ matrix.runtime }}

      - name: Publish self-contained build
        run: dotnet publish CreatioHelper/CreatioHelper.csproj --configuration Release --runtime ${{ matrix.runtime }} --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:EnableCompressionInSingleFile=true /p:DebugType=None --output publish --no-restore

      - name: Archive build
        if: runner.os == 'Windows'
        run: Compress-Archive -Path publish/* -DestinationPath CreatioHelper-${{ matrix.runtime }}.zip
        shell: pwsh
      - name: Archive build
        if: runner.os != 'Windows'
        run: zip -r CreatioHelper-${{ matrix.runtime }}.zip publish

      - name: Upload ZIP to GitHub Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: CreatioHelper-${{ matrix.runtime }}.zip
          asset_name: CreatioHelper-${{ matrix.runtime }}.zip
          asset_content_type: application/zip
